<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>RoShare — Red social de Roblox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0120;--bg2:#160930;--bg3:#1f0d40;
  --p:#7C3AED;--p2:#a78bfa;--p3:#ede9fe;--p4:#5B21B6;
  --acc:#DB2777;--acc2:#fce7f3;
  --y:#D97706;--y2:#fef3c7;
  --g:#059669;--g2:#d1fae5;
  --txt:#1a0533;--txt2:#4b5563;--txt3:#9ca3af;
  --b3:3px solid #1a0533;--b2:2px solid #1a0533;--b1:1px solid #1a0533;
  --sh:4px 4px 0 #1a0533;--sh2:3px 3px 0 #1a0533;--sh3:2px 2px 0 #1a0533;
  --r20:20px;--r14:14px;--r10:10px;--r8:8px;--r50:50px;
}
html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--txt);}

/* ── LAYOUT ── */
#shell{display:flex;min-height:100dvh;max-width:1280px;margin:0 auto;}

/* SIDEBAR (desktop) */
#sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:var(--b2);display:flex;flex-direction:column;padding:16px 12px;gap:6px;position:sticky;top:0;height:100dvh;}
#sidebar .logo-row{display:flex;align-items:center;gap:10px;padding:8px 6px 14px;border-bottom:1px solid var(--bg3);margin-bottom:6px;}
#sidebar .logo-row img{width:36px;height:36px;border-radius:10px;border:var(--b2);}
#sidebar .logo-ttl{font-family:'Fredoka One';font-size:1.4rem;color:#fff;letter-spacing:1px;}
#sidebar .logo-ttl span{color:var(--p2);}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r10);border:none;background:none;color:rgba(255,255,255,.7);font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Nunito';transition:background .15s,color .15s;text-align:left;width:100%;}
.sb-btn svg{width:20px;height:20px;flex-shrink:0;}
.sb-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
.sb-btn.active{background:var(--p);color:#fff;box-shadow:var(--sh3);}
.sb-btn.pub{background:var(--p);color:#fff;border:var(--b2);box-shadow:var(--sh2);margin-top:6px;}
.sb-btn.pub:hover{background:var(--p4);}
.sb-user{margin-top:auto;border-top:1px solid var(--bg3);padding-top:12px;display:flex;align-items:center;gap:10px;}
.sb-user .av{flex-shrink:0;}
.sb-user-name{color:#fff;font-weight:800;font-size:.85rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-logout{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);padding:4px;display:flex;}
.sb-logout:hover{color:var(--acc);}

/* MAIN CONTENT */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:rgba(13,1,32,.9);border-bottom:1px solid var(--bg3);position:sticky;top:0;z-index:10;}
.topbar-logo{display:flex;align-items:center;gap:9px;}
.topbar-logo img{width:32px;height:32px;border-radius:9px;border:var(--b2);}
.topbar-ttl{font-family:'Fredoka One';font-size:1.4rem;color:#fff;letter-spacing:1px;}
.topbar-ttl span{color:var(--p2);}

/* BOTTOM NAV (mobile only) */
.botnav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:var(--b3);z-index:20;}
.bnbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 calc(8px + env(safe-area-inset-bottom));background:none;border:none;cursor:pointer;color:var(--txt3);font-size:.58rem;font-weight:800;gap:2px;font-family:'Nunito';}
.bnbtn svg{width:21px;height:21px;}
.bnbtn.active{color:var(--p);}
.bnbtn.pub{background:var(--p);color:#fff;}

/* CONTENT AREA */
.screen{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.screen::-webkit-scrollbar{width:6px;}
.screen::-webkit-scrollbar-track{background:var(--bg);}
.screen::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}

/* FEED GRID */
.feed-grid{display:grid;grid-template-columns:1fr;gap:18px;}
@media(min-width:900px){.feed-grid{grid-template-columns:1fr 1fr;}}
@media(min-width:1200px){.feed-grid{grid-template-columns:1fr 1fr 1fr;}}

/* SECTION TITLE */
.sec-h{font-family:'Fredoka One';font-size:1.25rem;color:#fff;margin:4px 0 14px;display:flex;align-items:center;gap:8px;}
.pill{background:var(--p);color:#fff;font-size:.65rem;font-weight:900;padding:2px 8px;border-radius:50px;font-family:'Nunito';}

/* CARD */
.card{background:#fff;border:var(--b3);border-radius:var(--r20);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column;}
.card-img-wrap{position:relative;cursor:pointer;}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.card-ph{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:2.5rem;cursor:pointer;}
.card-badge{position:absolute;top:8px;left:8px;background:var(--p);color:#fff;font-size:.65rem;font-weight:900;padding:3px 9px;border-radius:50px;border:1.5px solid #fff;font-family:'Nunito';}
.card-body{padding:12px 14px 11px;flex:1;display:flex;flex-direction:column;}
.card-title{font-family:'Fredoka One';font-size:1.05rem;color:var(--txt);margin-bottom:3px;cursor:pointer;}
.card-title:hover{color:var(--p);}
.card-desc{font-size:.8rem;color:var(--txt2);margin-bottom:8px;line-height:1.4;flex:1;}
.card-meta{font-size:.72rem;color:var(--txt3);display:flex;align-items:center;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.card-actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.stat-chip{display:flex;align-items:center;gap:2px;font-size:.7rem;color:var(--txt3);font-weight:700;}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One';color:#fff;flex-shrink:0;}

/* VERIFIED BADGE */
.vbadge{display:inline-flex;align-items:center;gap:2px;background:var(--p);color:#fff;border-radius:50px;padding:1px 6px;font-size:.62rem;font-weight:900;font-family:'Nunito';vertical-align:middle;margin-left:3px;border:1.5px solid #fff;}

/* BUTTONS */
.abtn{display:flex;align-items:center;gap:4px;background:var(--p3);border:var(--b2);border-radius:var(--r50);padding:5px 11px;font-size:.76rem;font-weight:800;cursor:pointer;color:var(--txt);box-shadow:var(--sh3);font-family:'Nunito';transition:transform .1s;}
.abtn:active{transform:translate(2px,2px);box-shadow:none;}
.abtn.liked{background:var(--acc2);color:var(--acc);border-color:var(--acc);}
.abtn.faved{background:var(--y2);color:var(--y);border-color:var(--y);}
.play-btn{margin-left:auto;display:flex;align-items:center;gap:5px;background:var(--p);color:#fff;border:var(--b2);border-radius:var(--r50);padding:6px 15px;font-size:.8rem;font-weight:900;cursor:pointer;box-shadow:var(--sh3);transition:transform .1s;font-family:'Fredoka One';}
.play-btn:active{transform:translate(2px,2px);box-shadow:none;}
.btn-main{width:100%;background:var(--p);color:#fff;border:var(--b2);border-radius:var(--r14);padding:13px;font-size:.95rem;font-weight:900;font-family:'Fredoka One';cursor:pointer;box-shadow:var(--sh);transition:transform .12s;}
.btn-main:active{transform:translate(3px,3px);box-shadow:none;}
.btn-main:disabled{opacity:.6;cursor:not-allowed;transform:none!important;}
.icon-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:var(--r8);padding:7px 12px;cursor:pointer;color:#fff;display:flex;align-items:center;gap:5px;font-weight:800;font-size:.78rem;font-family:'Nunito';}
.icon-btn.dark{background:var(--p3);border:var(--b2);color:var(--txt);}

/* FORMS */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.field label{font-weight:800;font-size:.82rem;color:var(--txt);}
.field input,.field textarea{border:var(--b2);border-radius:var(--r14);padding:10px 14px;font-size:.87rem;font-family:'Nunito';background:#f8f5ff;outline:none;transition:border-color .15s,box-shadow .15s;width:100%;color:var(--txt);}
.field input:focus,.field textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.12);}
.field input::placeholder,.field textarea::placeholder{color:#b0a8c8;}
.err-msg{background:var(--acc2);border:2px solid var(--acc);border-radius:var(--r10);padding:8px 12px;font-size:.79rem;color:var(--acc);font-weight:700;margin-bottom:12px;}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-8px);background:#1a0533;color:#fff;border:var(--b2);border-radius:var(--r50);padding:9px 20px;font-size:.8rem;font-weight:800;font-family:'Nunito';z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:var(--sh);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{background:var(--g);}
#toast.err{background:var(--acc);}

/* AUTH */
.auth-wrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:var(--bg);}
.auth-card{background:#fff;border:var(--b3);border-radius:24px;box-shadow:6px 6px 0 #1a0533;padding:28px 24px;width:100%;max-width:400px;}
.auth-logo{text-align:center;margin-bottom:12px;}
.auth-logo img{width:76px;height:76px;border-radius:20px;border:var(--b3);box-shadow:var(--sh);}
.auth-ttl{font-family:'Fredoka One';font-size:2rem;text-align:center;color:var(--txt);}
.auth-sub{text-align:center;color:var(--p);font-weight:700;margin-bottom:18px;font-size:.87rem;}
.toggle-link{text-align:center;margin-top:12px;font-size:.82rem;color:var(--txt2);}
.toggle-link button{background:none;border:none;color:var(--p);font-weight:900;cursor:pointer;font-family:'Nunito';}

/* EMPTY / LOADER */
.loader{text-align:center;padding:28px;color:var(--p2);font-family:'Fredoka One';font-size:1rem;}
.empty{text-align:center;padding:36px 20px;}
.empty .ei{font-size:3rem;margin-bottom:8px;display:block;}
.empty .et{font-family:'Fredoka One';color:var(--p2);font-size:.95rem;}

/* SHIMMER */
.shimmer-card{background:#fff;border:var(--b3);border-radius:var(--r20);box-shadow:var(--sh);overflow:hidden;margin-bottom:0;}
.shimmer{background:linear-gradient(90deg,#f0ebff 25%,#e0d5ff 50%,#f0ebff 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
.sh-img{height:140px;}
.sh-body{padding:12px;}
.sh-line{height:13px;border-radius:7px;margin-bottom:9px;}
.sh-line.s{width:55%;}
.sh-line.m{width:80%;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* PROFILE */
.prof-banner{background:linear-gradient(135deg,var(--p),var(--acc));border-radius:var(--r20);padding:22px 16px 16px;margin-bottom:16px;text-align:center;border:var(--b3);box-shadow:var(--sh);}
.prof-name{font-family:'Fredoka One';font-size:1.4rem;color:#fff;margin:8px 0 2px;}
.prof-email{font-size:.75rem;color:rgba(255,255,255,.8);}
.prof-stats{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.pstat{background:rgba(255,255,255,.2);border-radius:var(--r14);padding:6px 14px;text-align:center;border:1.5px solid rgba(255,255,255,.3);}
.pstat-n{font-family:'Fredoka One';font-size:1.1rem;color:#fff;}
.pstat-l{font-size:.62rem;color:rgba(255,255,255,.8);font-weight:800;text-transform:uppercase;}

/* STUDIO */
.studio-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
@media(min-width:700px){.studio-grid{grid-template-columns:repeat(3,1fr);}}
.scard{background:#fff;border:var(--b3);border-radius:var(--r14);box-shadow:var(--sh3);padding:14px;text-align:center;}
.scard-n{font-family:'Fredoka One';font-size:1.9rem;color:var(--p);}
.scard-l{font-size:.68rem;font-weight:800;color:var(--txt2);}
.post-stat-row{background:#fff;border:var(--b3);border-radius:var(--r14);box-shadow:var(--sh3);padding:12px 14px;margin-bottom:10px;}
.psr-title{font-family:'Fredoka One';font-size:.92rem;color:var(--txt);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.psr-time{font-size:.68rem;color:var(--txt3);margin-bottom:8px;}
.bar-row{display:flex;align-items:center;gap:7px;font-size:.7rem;font-weight:800;margin-bottom:5px;}
.bar-label{width:54px;color:var(--txt2);text-align:right;flex-shrink:0;}
.bar-track{flex:1;background:#f0ebff;border-radius:50px;height:9px;overflow:hidden;}
.bar-fill{height:100%;border-radius:50px;transition:width .6s ease;}
.bar-val{width:26px;font-size:.69rem;color:var(--txt);}

/* BUMP BUTTON */
.bump-btn{width:100%;background:var(--y2);color:var(--y);border:2px solid var(--y);border-radius:var(--r14);padding:11px;font-size:.88rem;font-weight:900;font-family:'Fredoka One';cursor:pointer;box-shadow:var(--sh3);transition:transform .12s;text-align:center;}
.bump-btn:active{transform:translate(2px,2px);box-shadow:none;}
.bump-btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;}
.bump-countdown{font-size:.72rem;color:var(--txt3);font-weight:700;text-align:center;margin-top:4px;}

/* COMMENTS */
.cmt-card{background:#f9f5ff;border:var(--b2);border-radius:var(--r14);padding:10px 12px;margin-bottom:9px;display:flex;gap:9px;align-items:flex-start;}
.cmt-body{flex:1;}
.cmt-author{font-weight:900;font-size:.78rem;color:var(--p);margin-bottom:2px;}
.cmt-text{font-size:.82rem;color:var(--txt);line-height:1.4;}
.cmt-time{font-size:.67rem;color:#aaa;margin-top:3px;}
.cmt-row{display:flex;gap:8px;padding:10px 14px;background:#fff;border-top:2px solid #e8e0ff;position:sticky;bottom:0;z-index:5;}
.cmt-in{flex:1;border:var(--b2);border-radius:var(--r50);padding:9px 15px;font-size:.85rem;font-family:'Nunito';background:#f8f5ff;outline:none;transition:border-color .15s;color:var(--txt);}
.cmt-in:focus{border-color:var(--p);}
.send-btn{background:var(--p);color:#fff;border:var(--b2);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh3);flex-shrink:0;}

/* CREATE */
.create-card{background:#fff;border:var(--b3);border-radius:var(--r20);box-shadow:var(--sh);padding:18px;margin-bottom:14px;}
.url-ok{color:var(--g);font-size:.74rem;font-weight:800;margin-top:4px;}
.url-bad{color:var(--acc);font-size:.74rem;font-weight:800;margin-top:4px;}
.img-prev{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--r14);border:var(--b2);margin-top:7px;}
.img-upload-area{border:2px dashed var(--p);border-radius:var(--r14);cursor:pointer;text-align:center;transition:background .15s;overflow:hidden;background:#f8f5ff;position:relative;}
.img-upload-area:hover,.img-upload-area.drag{background:#ede9fe;}
.img-upload-ph{padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--p);font-weight:800;font-size:.83rem;pointer-events:none;}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-upload-preview{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.img-upload-bar{height:4px;background:var(--p3);}
.img-upload-progress{height:100%;background:var(--p);border-radius:0;transition:width .25s;width:0%;}
.img-upload-status{font-size:.72rem;font-weight:800;padding:3px 10px;text-align:center;}
.img-upload-status.ok{color:var(--g);}.img-upload-status.err{color:var(--acc);}
.img-tab-row{display:flex;margin-bottom:8px;border:var(--b2);border-radius:var(--r10);overflow:hidden;}
.img-tab{flex:1;padding:7px 10px;background:#f8f5ff;border:none;font-size:.78rem;font-weight:800;cursor:pointer;font-family:'Nunito';color:var(--txt2);transition:background .15s;}
.img-tab.active{background:var(--p);color:#fff;}
.mod-note{background:var(--bg2);border:1.5px solid var(--p);border-radius:var(--r14);padding:10px 14px;color:var(--p2);font-size:.76rem;font-weight:700;line-height:1.55;}

/* BACON FAB */
.bacon-fab{position:fixed;bottom:78px;right:16px;width:58px;height:58px;border-radius:50%;border:var(--b3);box-shadow:var(--sh);cursor:pointer;overflow:hidden;background:#fff;z-index:30;}
.bacon-fab img{width:100%;height:100%;object-fit:cover;}
.bacon-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:var(--b3);border-radius:24px 24px 0 0;z-index:40;max-height:80dvh;display:flex;flex-direction:column;box-shadow:0 -4px 20px rgba(0,0,0,.25);}
.bacon-hdr{display:flex;align-items:center;gap:10px;padding:13px 15px 9px;border-bottom:2px solid #ece8ff;}
.bacon-hdr img{width:38px;height:38px;border-radius:50%;border:var(--b2);}
.bacon-hdr-name{font-family:'Fredoka One';font-size:1.05rem;color:var(--txt);}
.bacon-hdr-sub{font-size:.67rem;color:var(--p);font-weight:800;}
.bacon-msgs{flex:1;overflow-y:auto;padding:11px 13px;display:flex;flex-direction:column;gap:9px;}
.bacon-msgs::-webkit-scrollbar{display:none;}
.bmsg{max-width:84%;}
.bmsg.user{align-self:flex-end;}
.bmsg.bot{align-self:flex-start;}
.bbubble{border:var(--b2);border-radius:18px;padding:8px 13px;font-size:.83rem;line-height:1.5;}
.bmsg.user .bbubble{background:var(--p);color:#fff;border-radius:18px 18px 4px 18px;border-color:var(--p4);}
.bmsg.bot .bbubble{background:#f9f5ff;color:var(--txt);border-radius:18px 18px 18px 4px;}
.bacon-quick{display:flex;gap:6px;overflow-x:auto;padding:7px 13px 0;scrollbar-width:none;}
.bacon-quick::-webkit-scrollbar{display:none;}
.qbtn{white-space:nowrap;background:var(--p3);border:2px solid var(--p);border-radius:var(--r50);padding:4px 12px;font-size:.71rem;font-weight:800;color:var(--p);cursor:pointer;flex-shrink:0;}
.bacon-in-row{display:flex;gap:8px;padding:9px 13px calc(14px + env(safe-area-inset-bottom));border-top:2px solid #ece8ff;}
.bacon-in{flex:1;border:var(--b2);border-radius:var(--r50);padding:9px 15px;font-size:.83rem;font-family:'Nunito';background:#f8f5ff;outline:none;color:var(--txt);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:35;}

/* CONFIRM SHEET */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.confirm-sheet{background:#fff;border-top:var(--b3);border-radius:24px 24px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));width:100%;max-width:480px;}
.confirm-ttl{font-family:'Fredoka One';font-size:1.1rem;color:var(--txt);margin-bottom:5px;}
.confirm-sub{font-size:.83rem;color:var(--txt2);margin-bottom:16px;line-height:1.4;}
.confirm-btns{display:flex;gap:10px;}
.btn-danger{flex:1;background:var(--acc);color:#fff;border:var(--b2);border-radius:var(--r14);padding:12px;font-size:.9rem;font-weight:900;font-family:'Fredoka One';cursor:pointer;box-shadow:var(--sh3);}
.btn-cancel{flex:1;background:var(--p3);color:var(--txt);border:var(--b2);border-radius:var(--r14);padding:12px;font-size:.9rem;font-weight:900;font-family:'Fredoka One';cursor:pointer;}

/* LINK ROW */
.link-row{display:flex;align-items:center;gap:6px;background:#f0ebff;border:2px solid var(--p);border-radius:var(--r8);padding:7px 12px;margin-bottom:12px;}
.link-txt{font-size:.7rem;color:var(--p);font-weight:700;word-break:break-all;flex:1;}

/* TABS */
.tabs{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:var(--r50);padding:6px 16px;font-size:.77rem;font-weight:800;cursor:pointer;white-space:nowrap;color:rgba(255,255,255,.65);}
.tab.active{background:#fff;color:var(--p);border-color:#fff;}

/* RECOMMENDED SECTION */
.rec-section{margin-bottom:8px;}
.rec-label{font-family:'Fredoka One';font-size:1rem;color:#fff;margin-bottom:10px;display:flex;align-items:center;gap:7px;}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{display:none;}
  .botnav{display:flex;}
  .screen{padding:12px 12px 80px;}
  .topbar{display:flex;}
  .bacon-fab{bottom:80px;}
}
@media(min-width:769px){
  .botnav{display:none!important;}
  .topbar{display:none;}
  #main{overflow-y:auto;}
  .screen{overflow-y:visible;}
  .bacon-fab{bottom:16px;right:16px;}
  .bacon-panel{max-width:400px;right:16px;left:auto;transform:none;border-radius:24px;bottom:90px;max-height:500px;}
}
@media(min-width:769px) and (max-width:1023px){
  #sidebar{width:200px;}
}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border:var(--b3);border-radius:20px;box-shadow:6px 6px 0 #1a0533;padding:24px;width:100%;max-width:400px;}
.modal-ttl{font-family:'Fredoka One';font-size:1.2rem;color:var(--txt);margin-bottom:14px;}
.modal-btns{display:flex;gap:10px;margin-top:16px;}

/* PAGE ANIM */
.page-in{animation:pageIn .22s ease both;}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.disclaimer{color:rgba(255,255,255,.3);font-size:.67rem;text-align:center;margin-top:14px;font-weight:700;}
</style>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function timeAgo(iso){
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return"ahora";if(s<3600)return`hace ${Math.floor(s/60)}m`;
  if(s<86400)return`hace ${Math.floor(s/3600)}h`;return`hace ${Math.floor(s/86400)}d`;
}
const COLS=["#7C3AED","#DB2777","#059669","#D97706","#DC2626","#2563EB","#0891B2","#6D28D9"];
function hc(s){let h=0;for(const c of(s||"X"))h=(h*31+c.charCodeAt(0))%COLS.length;return COLS[h];}
function safeMax(arr,fn){const v=arr.map(fn);return v.length?Math.max(1,...v):1;}

// Any account named "RoShare" (case-insensitive) is verified
function isVerified(username){
  return(username||"").trim().toLowerCase()==="roshare";
}
function vbadgeHtml(){
  return `<span class="vbadge">${I.check} Verificado</span>`;
}
function authorHtml(name){
  const v=isVerified(name);
  return `<span style="font-weight:800;color:#444">${esc(name)}${v?vbadgeHtml():""}</span>`;
}

// ── ALGORITHM ────────────────────────────────────────────────────────────────
// Score: clicks*3 + likes*2 + favorites*1.5 + views*0.5 + comments*1
// New boost: posts < 24h get +60 (decays proportionally in first 24h)
// Bump boost: +40 if bumped in last 2h
const BUMP_COOLDOWN_MS = 2 * 60 * 60 * 1000; // 2 hours

function algoScore(p){
  const ageMs = Date.now() - new Date(p.createdAt||0).getTime();
  const ageH  = ageMs / 3600000;
  // New boost: max 60 in first hour, decays to 0 by 24h
  const newBoost = ageH < 24 ? Math.max(0, 60 - ageH * 2.5) : 0;
  // Bump boost: +40 if bumped within last 2h
  const lastBump = p.lastBump ? new Date(p.lastBump).getTime() : 0;
  const bumpBoost = (Date.now() - lastBump) < BUMP_COOLDOWN_MS ? 40 : 0;
  const score =
    (p.clicks||0)*3 +
    (p.likes||[]).length*2 +
    (p.favorites||[]).length*1.5 +
    (p.views||0)*0.5 +
    (p.commentCount||0)*1 +
    newBoost + bumpBoost;
  return score;
}

function sortFeed(posts){
  return [...posts].sort((a,b)=>algoScore(b)-algoScore(a));
}

// Top 3 by score = recommended
function getRecommended(posts){
  return sortFeed(posts).slice(0,3);
}

// Check if post is bumped (bumped within last 2h)
function isBumped(p){
  if(!p.lastBump)return false;
  return(Date.now()-new Date(p.lastBump).getTime())<BUMP_COOLDOWN_MS;
}
// Check if post is new (< 24h)
function isNewPost(p){
  return(Date.now()-new Date(p.createdAt||0).getTime())<86400000;
}
// Bump cooldown remaining for a post owned by current user
function bumpCooldownLeft(p){
  if(!p.lastBump)return 0;
  const diff=BUMP_COOLDOWN_MS-(Date.now()-new Date(p.lastBump).getTime());
  return Math.max(0,diff);
}

// ── TOAST ────────────────────────────────────────────────────────────────────
let _tt=null;
function toast(msg,type=""){
  const el=document.getElementById("toast");
  el.textContent=msg;el.className="show "+(type||"");
  clearTimeout(_tt);_tt=setTimeout(()=>el.className="",2800);
}

// ── FIRESTORE CODEC ──────────────────────────────────────────────────────────
function enc(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(typeof v==="string")return{stringValue:v};
  if(typeof v==="boolean")return{booleanValue:v};
  if(typeof v==="number")return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.map(enc)}};
  return{stringValue:String(v)};
}
function dec(v){
  if(!v)return null;
  if("stringValue"  in v)return v.stringValue;
  if("integerValue" in v)return parseInt(v.integerValue);
  if("doubleValue"  in v)return v.doubleValue;
  if("booleanValue" in v)return v.booleanValue;
  if("nullValue"    in v)return null;
  if("timestampValue" in v)return v.timestampValue;
  if("arrayValue"   in v)return(v.arrayValue.values||[]).map(dec);
  if("mapValue"     in v)return fromDoc(v.mapValue);
  return null;
}
function toDoc(o){const f={};for(const[k,v]of Object.entries(o)){if(v!==undefined)f[k]=enc(v);}return{fields:f};}
function fromDoc(d){
  if(!d?.fields)return null;
  const o={_id:d.name?.split("/").pop(),_path:d.name};
  for(const[k,v]of Object.entries(d.fields))o[k]=dec(v);
  return o;
}
function h(tok){return tok?{Authorization:`Bearer ${tok}`}:{};}

// ── FIRESTORE API ─────────────────────────────────────────────────────────────
async function fsSet(path,data,tok){
  const clean={...data};delete clean._id;delete clean._path;
  const r=await fetch(`${FS}/${path}`,{method:"PATCH",headers:{"Content-Type":"application/json",...h(tok)},body:JSON.stringify(toDoc(clean))});
  return fromDoc(await r.json());
}
async function fsAdd(col,data,tok){
  const r=await fetch(`${FS}/${col}`,{method:"POST",headers:{"Content-Type":"application/json",...h(tok)},body:JSON.stringify(toDoc(data))});
  return fromDoc(await r.json());
}
async function fsGet(path,tok){
  const r=await fetch(`${FS}/${path}`,{headers:h(tok)});
  const d=await r.json();return d.error?null:fromDoc(d);
}
async function fsDel(path,tok){await fetch(`${FS}/${path}`,{method:"DELETE",headers:h(tok)});}
async function fsQuery(col,order="createdAt",dir="DESCENDING",lim=60,tok){
  const body={structuredQuery:{from:[{collectionId:col}],orderBy:[{field:{fieldPath:order},direction:dir}],limit:lim}};
  const r=await fetch(`${FS}:runQuery`,{method:"POST",headers:{"Content-Type":"application/json",...h(tok)},body:JSON.stringify(body)});
  const a=await r.json();
  return(Array.isArray(a)?a:[]).filter(i=>i.document).map(i=>fromDoc(i.document));
}
async function fsQuerySub(parent,col,order="createdAt",dir="ASCENDING",tok){
  const body={structuredQuery:{from:[{collectionId:col}],orderBy:[{field:{fieldPath:order},direction:dir}]}};
  const r=await fetch(`${FS}/${parent}:runQuery`,{method:"POST",headers:{"Content-Type":"application/json",...h(tok)},body:JSON.stringify(body)});
  const a=await r.json();
  return(Array.isArray(a)?a:[]).filter(i=>i.document).map(i=>fromDoc(i.document));
}

function isRobloxUrl(u){
  if(!u)return false;
  return /^https?:\/\/(www\.)?roblox\.com\/games\/\d+/.test(u)||
         /^https?:\/\/(www\.)?roblox\.com\/share\?/.test(u);
}

// ── GROQ / BACON ─────────────────────────────────────────────────────────────
const BACON_SYS=`Eres Bacon 🥓, asistente simpático de RoShare (red social de juegos Roblox). Eres como un bacon hair pero inteligente. Respondes en español, máximo 3 oraciones. Sugieres títulos creativos para juegos Roblox, das ideas, ayudas con la app. MODERACIÓN: si el link NO es de roblox.com (ni roblox.com/games/ ni roblox.com/share?) responde EXACTAMENTE: ELIMINAR:motivo`;
async function baconChat(msgs){
  try{
    const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json",Authorization:`Bearer ${GROQ_KEY}`},
      body:JSON.stringify({model:"llama-3.1-8b-instant",messages:[{role:"system",content:BACON_SYS},...msgs],max_tokens:400,temperature:.8})
    });
    if(!r.ok){const e=await r.json();throw new Error(e.error?.message||"Groq error "+r.status);}
    const d=await r.json();
    const txt=d.choices?.[0]?.message?.content;
    if(txt)return txt;
    throw new Error("Respuesta vacía");
  }catch(groqErr){
    console.warn("Groq falló:",groqErr.message,". Usando respuestas locales...");
    return baconLocal(msgs);
  }
}

// Respuestas locales cuando Groq no está disponible
function baconLocal(msgs){
  const last=(msgs[msgs.length-1]?.content||"").toLowerCase();
  // Moderation check - if it's a moderation request, validate the URL ourselves
  if(last.includes("revisa")&&last.includes("url:")){
    const urlMatch=last.match(/url:\s*(https?:\/\/[^\n]+)/i);
    if(urlMatch){
      const u=urlMatch[1].trim();
      if(/roblox\.com\/(games\/|share\?)/.test(u))return"✅ Link válido de Roblox 🥓";
      return"ELIMINAR:El link no es de roblox.com";
    }
  }
  if(last.includes("título")||last.includes("nombre")||last.includes("title"))
    return["🥓 ¡Claro! Aquí van algunos títulos: 'Blox Adventure Pro', 'Sky Wars Ultimate', 'Obby Extremo 2025', 'Pet Simulator Z'. ¡Elegí el que más te guste!",
           "🎮 Ideas de títulos: 'The Last Noob', 'Dragon Tycoon Mega', 'Speed Run Legends', 'Zombie Survival Pro'. ¡Todos suenan épicos!",
           "✨ Prueba con: 'Epic Sword Fight', 'Neon Obby', 'Base Race 3D', o 'Tycoon Island'. ¡Los títulos cortos funcionan mejor!"][Math.floor(Math.random()*3)];
  if(last.includes("idea")||last.includes("juego"))
    return["💡 Ideas para tu juego: un obby con temática submarina, un tycoon de pizzería, o un simulador de mascotas espaciales. ¡Los tycoons siempre tienen muchos jugadores! 🥓",
           "🎮 ¿Qué tal un battle royale de bloques, un simulador de granja futurista, o un obby con plataformas invisibles? ¡Los retos siempre enganchan!",
           "🚀 Ideas top: simulador de carreras en el espacio, tycoon de helados, o un RPG de mazmorras con bloques. ¡Los simuladores son tendencia en Roblox!"][Math.floor(Math.random()*3)];
  if(last.includes("algoritmo")||last.includes("recomend")||last.includes("impulsar"))
    return"📊 El algoritmo de RoShare suma: clicks×3 + likes×2 + favoritos×1.5 + vistas×0.5. ¡Los juegos nuevos tienen boost extra el primer día! Usá el botón Impulsar en Studio para aparecer en Recomendados 2h gratis 🚀";
  if(last.includes("quién")||last.includes("eres"))
    return"🥓 ¡Soy Bacon! El asistente oficial de RoShare. Soy como un bacon hair de Roblox pero mucho más listo. Puedo sugerirte títulos, darte ideas para tu juego, y explicarte cómo funciona la app. ¿En qué te ayudo?";
  if(last.includes("jugar")||last.includes("recomienda"))
    return["🎮 Publicá tu juego en RoShare para que otros lo descubran. ¡Entre más clicks tenga, más sube en el feed! 🥓",
           "🚀 Buscá en el Feed los juegos con el badge '✨ Nuevo' — son los más recientes y vale la pena probarlos primero!"][Math.floor(Math.random()*2)];
  return["🥓 ¡Buena pregunta! Puedo ayudarte con títulos para tu juego, ideas creativas, o explicarte cómo funciona RoShare. ¿Qué necesitás?",
         "✨ ¡Hola! Soy Bacon, tu asistente de RoShare. Preguntame sobre títulos, ideas para juegos, o cómo usar la app. 🎮"][Math.floor(Math.random()*2)];
}
async function modPost(title,url,desc){
  // Local fast-check first — avoids Groq round-trip for obvious cases
  if(!isRobloxUrl(url))return{valid:false,reason:"El link no es de roblox.com"};
  // Ask Bacon for extra validation (title quality etc)
  const res=await baconChat([{role:"user",content:`Revisa:\nTítulo: ${title}\nURL: ${url}\nDesc: ${desc||"-"}\n¿Link válido roblox.com/games/?`}]);
  return{valid:!res.startsWith("ELIMINAR:"),reason:res.startsWith("ELIMINAR:")?res.slice(8):null};
}

async function toggleLike(id){
  const p=S.posts[id];if(!p||!S.auth)return;
  const likes=p.likes||[];const liked=likes.includes(S.auth.localId);
  const next=liked?likes.filter(x=>x!==S.auth.localId):[...likes,S.auth.localId];
  S.posts[id]={...p,likes:next};
  const btn=document.getElementById(`like_${id}`);
  if(btn){btn.className="abtn"+(next.includes(S.auth.localId)?" liked":"");btn.innerHTML=(next.includes(S.auth.localId)?I.heartF:I.heart)+`<span>${next.length}</span>`;}
  await fsSet(`posts/${id}`,S.posts[id],S.auth.idToken);
}
async function toggleFav(id){
  const p=S.posts[id];if(!p||!S.auth)return;
  const favs=p.favorites||[];const faved=favs.includes(S.auth.localId);
  const next=faved?favs.filter(x=>x!==S.auth.localId):[...favs,S.auth.localId];
  S.posts[id]={...p,favorites:next};
  const btn=document.getElementById(`fav_${id}`);
  if(btn){btn.className="abtn"+(next.includes(S.auth.localId)?" faved":"");btn.innerHTML=(next.includes(S.auth.localId)?I.starF:I.star)+`<span>${next.length}</span>`;}
  if(S.view==="favorites"&&faved){
    const card=document.getElementById(`pc_${id}`);
    if(card){card.style.opacity="0";card.style.transform="scale(.9)";card.style.transition=".3s";setTimeout(()=>card.remove(),300);}
  }
  await fsSet(`posts/${id}`,S.posts[id],S.auth.idToken);
}

async function playGame(id){
  const card=document.getElementById(`pc_${id}`);
  const url=card?.dataset?.url||S.posts[id]?.robloxUrl||"";
  if(!url)return;
  const p=S.posts[id];
  if(p){
    const nc=(p.clicks||0)+1;
    S.posts[id]={...p,clicks:nc};
    // Update stat chip in card
    const chips=card?.querySelectorAll(".stat-chip");
    if(chips&&chips[1])chips[1].innerHTML=`${I.cursor}${nc}`;
    fsSet(`posts/${id}`,S.posts[id],S.auth.idToken);
  }
  window.open(url,"_blank");
}

async function openPost(id){
  if(!S.posts[id]){const p=await fsGet(`posts/${id}`,S.auth?.idToken);if(p)S.posts[id]=p;}
  const p=S.posts[id];if(!p)return;
  // increment views
  const nv=(p.views||0)+1;
  S.posts[id]={...p,views:nv};
  fsSet(`posts/${id}`,S.posts[id],S.auth.idToken);
  S.prevView=S.view;
  S.selectedPostId=id;
  goView("post");
}

// ── BUMP ──────────────────────────────────────────────────────────────────────
async function bumpPost(id){
  const p=S.posts[id];if(!p)return;
  const left=bumpCooldownLeft(p);
  if(left>0){toast(`Próximo bump en ${fmtMs(left)}`,"");return;}
  const now=new Date().toISOString();
  S.posts[id]={...p,lastBump:now};
  await fsSet(`posts/${id}`,S.posts[id],S.auth.idToken);
  toast("🚀 ¡Juego impulsado! Aparecerá en recomendados","ok");
  goView("studio");
}
function fmtMs(ms){
  const m=Math.floor(ms/60000);const s=Math.floor((ms%60000)/1000);
  return m>0?`${m}m ${s}s`:`${s}s`;
}

async function authSubmit(){
  const btn=document.getElementById("auth-btn");

  const email=(document.getElementById("a-email")?.value||"").trim();
  const pass=document.getElementById("a-pass")?.value||"";

  try{

      if(!username){errEl.innerHTML=`<div class="err-msg">⚠️ Pon tu nombre de usuario</div>`;return;}
      const d=await fbSignUp(email,pass,username);
      saveAuth({...d,username,verified:isVerified(username)});
    }else{
      const d=await fbSignIn(email,pass);
      const prof=await fsGet(`users/${d.localId}`,d.idToken);
      // prof can be null if rules block OR if user was created outside the app
      const username=prof?.username||d.email.split("@")[0];
      const verified=prof?.verified||isVerified(username);
      saveAuth({...d,username,verified});
    }
    route();
  }catch(e){
    errEl.innerHTML=`<div class="err-msg">⚠️ ${AERRS[e.message]||e.message}</div>`;

  }
}

// ── IMAGE UPLOAD (Canvas compress → Firestore base64) ────────────────────────
// No Firebase Storage needed — free plan compatible
let _uploadedImgUrl = "";

function switchImgTab(mode){
  document.getElementById("tab-file").className="img-tab"+(mode==="file"?" active":"");
  document.getElementById("tab-url").className="img-tab"+(mode==="url"?" active":"");
  document.getElementById("img-file-panel").style.display=mode==="file"?"block":"none";
  document.getElementById("img-url-panel").style.display=mode==="url"?"block":"none";
  if(mode==="url")_uploadedImgUrl=""; // clear upload when switching to URL mode
}

function handleImgDrop(e){
  e.preventDefault();
  document.getElementById("img-drop").classList.remove("drag");
  const file=e.dataTransfer?.files?.[0];
  if(file)handleImgFile(file);
}

async function handleImgFile(file){
  if(!file)return;
  if(!file.type.startsWith("image/")){setImgStatus("Solo se aceptan imágenes","err");return;}
  if(file.size>15*1024*1024){setImgStatus("La imagen no puede superar 15MB","err");return;}
  setImgStatus("⏳ Procesando imagen...","");
  setProgress(20);
  try{
    const dataUrl = await compressImage(file, 960, 540, 0.72);
    setProgress(80);
    // Show preview
    const prev=document.getElementById("img-preview-file");
    const ph=document.getElementById("img-ph");
    if(prev){prev.src=dataUrl;prev.style.display="block";}
    if(ph)ph.style.display="none";
    _uploadedImgUrl=dataUrl;
    setProgress(100);
    const kb=Math.round(dataUrl.length*0.75/1024);
    setImgStatus(`✅ Lista (${kb}KB comprimida)`,"ok");
  }catch(err){
    _uploadedImgUrl="";
    setImgStatus("❌ Error: "+err.message,"err");
    setProgress(0);
  }
}

function compressImage(file, maxW, maxH, quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("No se pudo leer el archivo"));
    reader.onload=e=>{
      const img=new Image();
      img.onerror=()=>reject(new Error("No se pudo cargar la imagen"));
      img.onload=()=>{
        let w=img.width, h=img.height;
        // Scale down keeping aspect ratio
        if(w>maxW||h>maxH){
          const ratio=Math.min(maxW/w,maxH/h);
          w=Math.round(w*ratio);h=Math.round(h*ratio);
        }
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function setProgress(pct){
  const el=document.getElementById("img-progress");if(el)el.style.width=pct+"%";
}
function setImgStatus(msg,type){
  const el=document.getElementById("img-status");
  if(!el)return;
  el.textContent=msg;el.className="img-upload-status"+(type?" "+type:"");
}

function getImageUrl(){
  const urlPanel=document.getElementById("img-url-panel");
  if(urlPanel&&urlPanel.style.display!=="none"){
    return(document.getElementById("c-img")?.value||"").trim();
  }
  return _uploadedImgUrl||"";
}

    // Build bump rows
    const postRows=mine.map(p=>{
      const v=p.views||0,c=p.clicks||0,l=(p.likes||[]).length,f=(p.favorites||[]).length,cm=p.commentCount||0;
      const left=bumpCooldownLeft(p);
      const score=Math.round(algoScore(p));
      const bumpDisabled=left>0;
      const bumpLabel=bumpDisabled?`⏳ ${fmtMs(left)}`:"🚀 Impulsar ahora";
      return `<div class="post-stat-row">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px">
          <div>
            <div class="psr-title">🎮 ${esc(p.title)}</div>
            <div class="psr-time">${timeAgo(p.createdAt)} · Puntuación: <strong>${score}</strong>${isBumped(p)?" 🚀":""}${isNewPost(p)?" ✨":""}</div>
          </div>
        </div>
        <div class="bar-row"><span class="bar-label">${I.eye} Vistas</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/mxV*100)}%;background:var(--p)"></div></div><span class="bar-val">${v}</span></div>
        <div class="bar-row"><span class="bar-label">${I.cursor} Plays</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/mxC*100)}%;background:var(--g)"></div></div><span class="bar-val">${c}</span></div>
        <div class="bar-row"><span class="bar-label">${I.heart} Likes</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(l/mxL*100)}%;background:var(--acc)"></div></div><span class="bar-val">${l}</span></div>
        <div class="bar-row"><span class="bar-label">${I.star} Favs</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(f/mxF*100)}%;background:var(--y)"></div></div><span class="bar-val">${f}</span></div>
        <div class="bar-row"><span class="bar-label">${I.msg} Cmts</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(cm/mxCmt*100)}%;background:#3B82F6"></div></div><span class="bar-val">${cm}</span></div>
        <div style="margin-top:10px">
          <button class="bump-btn" onclick="bumpPost('${p._id}')" ${bumpDisabled?"disabled":""}>${bumpLabel}</button>
          ${bumpDisabled?`<div class="bump-countdown">🕐 Podrás impulsar en ${fmtMs(left)}</div>`:`<div class="bump-countdown">Gratis · Siguiente bump disponible en 2h tras usarlo</div>`}
        </div>
      </div>`;
    }).join("")||`<div class="empty"><span class="ei">📊</span><div class="et">Publica algo para ver estadísticas</div></div>`;

    wrap.innerHTML=`
      <div class="sec-h">📊 Studio</div>
      <div class="studio-grid">
        <div class="scard"><div class="scard-n">${tV}</div><div class="scard-l">👁️ Vistas totales</div></div>
        <div class="scard"><div class="scard-n">${tC}</div><div class="scard-l">▶️ Clicks Play</div></div>
        <div class="scard"><div class="scard-n">${tL}</div><div class="scard-l">❤️ Likes</div></div>
        <div class="scard"><div class="scard-n">${tF}</div><div class="scard-l">⭐ Favoritos</div></div>
        <div class="scard"><div class="scard-n">${tCmt}</div><div class="scard-l">💬 Comentarios</div></div>
        <div class="scard"><div class="scard-n">${mine.length}</div><div class="scard-l">🎮 Juegos</div></div>
      </div>
      <div class="sec-h" style="font-size:1.05rem">🚀 Impulsar juegos <span class="pill">Gratis cada 2h</span></div>
      <div style="background:var(--bg2);border:1.5px solid var(--p);border-radius:12px;padding:10px 14px;color:var(--p2);font-size:.76rem;font-weight:700;margin-bottom:14px;line-height:1.6">
        📈 <strong style="color:#fff">Algoritmo RoShare</strong> — Los juegos con más clicks suben. Posts nuevos (primer día) arrancan con boost. Impulsar te pone en Recomendados por 2 horas.
      </div>
      <div class="sec-h" style="font-size:1rem">📈 Por publicación</div>
      ${postRows}`;
  });
}

// ── BACON ─────────────────────────────────────────────────────────────────────
const QUICK_OPTS=["💡 Ideas para mi juego","✍️ Sugerir título","🎮 ¿Qué jugar hoy?","🚀 ¿Cómo funciona el algoritmo?","🥓 ¿Quién eres?"];
function toggleBacon(){S.baconOpen=!S.baconOpen;S.baconOpen?openBacon():closeBacon();}
function closeBacon(){S.baconOpen=false;document.getElementById("bacon-panel")?.remove();document.getElementById("bacon-ov")?.remove();}
function openBacon(){
  S.baconOpen=true;
  document.getElementById("bacon-panel")?.remove();document.getElementById("bacon-ov")?.remove();
  const ov=document.createElement("div");ov.id="bacon-ov";ov.className="overlay";ov.onclick=closeBacon;
  const panel=document.createElement("div");panel.id="bacon-panel";panel.className="bacon-panel";
  panel.innerHTML=`
    <div class="bacon-hdr">
      <img src="${BACON_IMG}" alt="Bacon">
      <div style="flex:1"><div class="bacon-hdr-name">Bacon 🥓</div><div class="bacon-hdr-sub">Asistente de RoShare · Siempre listo</div></div>
      <button onclick="closeBacon()" style="background:none;border:none;cursor:pointer;color:#888;padding:4px">${I.close}</button>
    </div>
    <div class="bacon-quick">${QUICK_OPTS.map(q=>`<button class="qbtn" onclick="baconSend('${esc(q)}')">${esc(q)}</button>`).join("")}</div>
    <div class="bacon-msgs" id="bacon-msgs">${S.baconMsgs.map(m=>`<div class="bmsg ${m.r}"><div class="bbubble">${esc(m.t)}</div></div>`).join("")}</div>
    <div class="bacon-in-row">
      <input class="bacon-in" id="bacon-in" placeholder="Pregúntale a Bacon..." onkeydown="if(event.key==='Enter')baconSend()">
      <button class="send-btn" onclick="baconSend()">${I.send}</button>
    </div>`;
  document.body.appendChild(ov);document.body.appendChild(panel);
  setTimeout(()=>{const m=document.getElementById("bacon-msgs");if(m)m.scrollTop=m.scrollHeight;},60);
}
async function baconSend(txt){
  if(S.baconThinking)return;
  const inp=document.getElementById("bacon-in");
  const msg=txt||(inp?.value?.trim()||"");
  if(!msg)return;
  if(inp)inp.value="";
  S.baconMsgs.push({r:"user",t:msg});
  appendBMsg("user",msg);
  S.baconThinking=true;
  const tid="bt"+Date.now();appendBMsg("bot","🥓 pensando...",tid);
  try{
    const history=S.baconMsgs.slice(-12).map(m=>({role:m.r==="user"?"user":"assistant",content:m.t}));
    const reply=await baconChat(history);
    document.getElementById(tid)?.remove();
    S.baconMsgs.push({r:"bot",t:reply});appendBMsg("bot",reply);
  }catch(e){document.getElementById(tid)?.remove();console.error("Bacon error:",e);appendBMsg("bot","¡Ups! Hubo un error: "+e.message+" 🥓");}
  S.baconThinking=false;
}
function appendBMsg(role,text,id){
  const c=document.getElementById("bacon-msgs");if(!c)return;
  const d=document.createElement("div");d.className=`bmsg ${role}`;if(id)d.id=id;
  d.innerHTML=`<div class="bbubble">${esc(text)}</div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}

// ── USERNAME CHANGE ───────────────────────────────────────────────────────────
function showChangeUsername(){
  document.getElementById("uname-modal")?.remove();
  const m=document.createElement("div");
  m.id="uname-modal";m.className="modal-overlay";
  m.innerHTML=`<div class="modal">
    <div class="modal-ttl">✏️ Cambiar nombre de usuario</div>
    <div id="uname-err"></div>
    <div class="field">
      <label>Nuevo usuario</label>
      <input id="uname-in" placeholder="nuevo usuario" maxlength="20" value="${esc(S.auth.username||"")}" onkeydown="if(event.key==='Enter')doChangeUsername()">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('uname-modal').remove()">Cancelar</button>
      <button class="btn-main" id="uname-btn" onclick="doChangeUsername()" style="flex:1">Guardar</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  setTimeout(()=>document.getElementById("uname-in")?.focus(),80);
}

async function doChangeUsername(){
  const inp=document.getElementById("uname-in");
  const btn=document.getElementById("uname-btn");
  const errEl=document.getElementById("uname-err");
  const newName=(inp?.value||"").trim();
  errEl.innerHTML="";
  if(!newName){errEl.innerHTML=`<div class="err-msg">⚠️ Escribe un nombre de usuario</div>`;return;}
  if(newName===S.auth.username){document.getElementById("uname-modal")?.remove();return;}
  if(newName.length<3){errEl.innerHTML=`<div class="err-msg">⚠️ Mínimo 3 caracteres</div>`;return;}
  if(!/^[a-zA-Z0-9_]+$/.test(newName)){errEl.innerHTML=`<div class="err-msg">⚠️ Solo letras, números y _</div>`;return;}
  btn.disabled=true;btn.textContent="Verificando...";
  try{
    // Check if username is already taken by querying all users
    const body={structuredQuery:{from:[{collectionId:"users"}],where:{fieldFilter:{field:{fieldPath:"username"},op:"EQUAL",value:{stringValue:newName}}},limit:1}};
    const r=await fetch(`${FS}:runQuery`,{method:"POST",headers:{"Content-Type":"application/json",...h(S.auth.idToken)},body:JSON.stringify(body)});
    const results=await r.json();
    const taken=(Array.isArray(results)?results:[]).filter(i=>i.document&&i.document.name.split("/").pop()!==S.auth.localId);
    if(taken.length>0){errEl.innerHTML=`<div class="err-msg">⚠️ Ese nombre ya está en uso</div>`;return;}
    // Update in Firestore
    await fsSet(`users/${S.auth.localId}`,{username:newName,email:S.auth.email,uid:S.auth.localId,verified:isVerified(newName)},S.auth.idToken);
    // Update local session
    S.auth.username=newName;
    S.auth.verified=isVerified(newName);
    saveAuth(S.auth);
    document.getElementById("uname-modal")?.remove();
    toast("✅ Usuario actualizado a @"+newName,"ok");
    renderSidebar();
    goView("profile");
  }catch(e){
    errEl.innerHTML=`<div class="err-msg">⚠️ Error: ${esc(e.message)}</div>`;
  }finally{
    if(btn){btn.disabled=false;btn.textContent="Guardar";}
  }
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
route();
</script>
